name: Feature request
description: Suggest an idea for Neon Dash
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve, or what would it improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Gameplay
        - UI/UX
        - Progression
        - Performance
        - Audio
        - Localization
        - Build/CI
        - Other
    validations:
      required: true
