name: Android Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      release:
        description: "Also build release artifacts"
        type: boolean
        default: false

env:
  GODOT_VERSION: "4.3"
  ANDROID_PACKAGE: "com.neondash.game"

jobs:
  build-android:
    name: Build APK & AAB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build-tools & platform
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Download Godot ${{ env.GODOT_VERSION }} + export templates
        run: |
          set -e
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable"
          curl -L -o godot.zip "$BASE/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -o godot.zip
          mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 godot && chmod +x godot
          curl -L -o templates.tpz "$BASE/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          unzip -o templates.tpz -d /tmp/templates
          cp -r /tmp/templates/templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/

      - name: Configure Godot Android SDK path
        run: |
          mkdir -p ~/.config/godot
          EDITOR_SETTINGS=~/.config/godot/editor_settings-4.tres
          cat > "$EDITOR_SETTINGS" <<EOF
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/android_sdk_path = "$ANDROID_HOME"
          export/android/debug_keystore = "$ANDROID_HOME/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      - name: Generate Android debug keystore
        run: |
          keytool -keyalg RSA -genkeypair -alias androiddebugkey \
            -keypass android -keystore "$ANDROID_HOME/debug.keystore" \
            -storepass android -dname "CN=Android Debug,O=Android,C=US" \
            -validity 10000 -deststoretype pkcs12

      - name: Import project
        run: ./godot --headless --path . --import || true

      - name: Build debug APK
        run: |
          mkdir -p export
          ./godot --headless --path . --export-debug "Android" export/neon-dash-debug.apk

      - name: Decode release keystore (release only)
        if: startsWith(github.ref, 'refs/tags/v') || inputs.release
        env:
          KS: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KS" ]; then
            echo "::warning::ANDROID_KEYSTORE_BASE64 not set; skipping signed release build."
            echo "HAVE_KEYSTORE=false" >> "$GITHUB_ENV"
          else
            echo "$KS" | base64 -d > /tmp/release.keystore
            echo "HAVE_KEYSTORE=true" >> "$GITHUB_ENV"
          fi

      - name: Build release APK & AAB (signed)
        if: (startsWith(github.ref, 'refs/tags/v') || inputs.release) && env.HAVE_KEYSTORE == 'true'
        env:
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.ANDROID_KEY_ALIAS_PASSWORD }}
        run: |
          export GODOT_ANDROID_KEYSTORE_RELEASE_PATH=/tmp/release.keystore
          export GODOT_ANDROID_KEYSTORE_RELEASE_USER="$KEY_ALIAS"
          export GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD="$KEYSTORE_PASS"
          ./godot --headless --path . --export-release "Android" export/neon-dash-release.apk
          ./godot --headless --path . --export-release "Android" export/neon-dash-release.aab

      - name: Clean up keystore
        if: always()
        run: rm -f /tmp/release.keystore

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: android-artifacts
          path: |
            export/*.apk
            export/*.aab
          if-no-files-found: warn

  release:
    name: Publish GitHub Release
    needs: build-android
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-artifacts
          path: export

      - name: Create release & attach artifacts
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            export/*.apk
            export/*.aab
