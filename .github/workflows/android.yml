name: Android Debug Build

# Debug-only Android build for validating the Android toolchain and export.
# Production/signed releases are handled exclusively by android-release.yml
# (triggered by v* tags) to avoid duplicate releases.

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "export_presets.cfg"
      - ".github/workflows/android*.yml"

permissions:
  contents: read

env:
  GODOT_VERSION: "4.3"
  EXPORT_PRESET: "Android"

jobs:
  build-debug:
    name: Build debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools & platform
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Download Godot ${{ env.GODOT_VERSION }} + export templates
        run: |
          set -euo pipefail
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable"
          curl -fsSL -o godot.zip "$BASE/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -o godot.zip
          mv Godot_v${GODOT_VERSION}-stable_linux.x86_64 godot && chmod +x godot
          TPL_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          curl -fsSL -o templates.tpz "$BASE/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          mkdir -p "$TPL_DIR"
          unzip -o templates.tpz -d /tmp/templates
          cp -r /tmp/templates/templates/* "$TPL_DIR/"

      - name: Configure Godot Android SDK path + debug keystore
        run: |
          set -euo pipefail
          mkdir -p ~/.config/godot
          keytool -keyalg RSA -genkeypair -alias androiddebugkey \
            -keypass android -keystore "$ANDROID_HOME/debug.keystore" \
            -storepass android -dname "CN=Android Debug,O=Android,C=US" \
            -validity 10000 -deststoretype pkcs12
          cat > ~/.config/godot/editor_settings-4.tres <<EOF
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/android_sdk_path = "$ANDROID_HOME"
          export/android/debug_keystore = "$ANDROID_HOME/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      - name: Import project
        run: ./godot --headless --path . --import || true

      - name: Build debug APK
        run: |
          set -euo pipefail
          mkdir -p export
          ./godot --headless --path . --install-android-build-template \
            --export-debug "${EXPORT_PRESET}" export/neon-dash-debug.apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: export/*.apk
          if-no-files-found: warn
